<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Football Grounds</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- MENU SCREEN -->
    <div id="menu-screen" class="screen active">
        <span id="version-tag">v1.5</span>
        <div class="menu-container">
            <h1>Football Grounds</h1>

            <div class="option-group">
                <h2>League</h2>
                <div class="btn-group">
                    <button class="option-btn selected" data-league="premier">Premier League</button>
                    <button class="option-btn" data-league="championship">Championship</button>
                    <button class="option-btn" data-league="both">Both</button>
                </div>
            </div>

            <div class="option-group">
                <h2>Difficulty</h2>
                <div class="btn-group">
                    <button class="option-btn selected" data-difficulty="easy" data-tooltip="Image, stadium name + club name">Easy</button>
                    <button class="option-btn" data-difficulty="medium" data-tooltip="Image + stadium name only">Medium</button>
                    <button class="option-btn" data-difficulty="hard" data-tooltip="Image only">Hard</button>
                </div>
            </div>

            <button id="start-btn" class="primary-btn">Start Game</button>
            <button id="view-leaderboard-btn" class="secondary-btn">Leaderboard</button>
        </div>
    </div>

    <!-- LEADERBOARD OVERLAY -->
    <div id="leaderboard-overlay" class="overlay hidden">
        <div class="final-card">
            <h2>Leaderboard</h2>
            <div class="leaderboard-tabs">
                <button class="tab-btn active" data-tab="alltime">All Time</button>
                <button class="tab-btn" data-tab="today">Today</button>
            </div>
            <div id="menu-leaderboard-list"></div>
            <button id="close-leaderboard-btn" class="primary-btn">Back</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div id="map"></div>
        <div id="map-overlay-top">
            <button id="back-btn" class="back-btn">&larr; Back</button>
            <div id="clue-box">
                <span id="clue-stadium"></span>
                <span id="clue-club"></span>
            </div>
            <div id="score-box">
                <span>Round <span id="round-num">1</span>/<span id="round-total">10</span></span>
                <span>Score: <span id="total-score">0</span></span>
            </div>
        </div>
        <div id="map-overlay-bottom">
            <p id="hint-text">Click on the map to place your guess</p>
            <button id="lock-btn" class="primary-btn" disabled>Lock In Guess</button>
        </div>

        <!-- RESULT PANEL (inside game screen) -->
        <div id="result-panel" class="hidden">
            <div id="drag-handle"><span class="drag-bar"></span></div>
            <div class="result-card">
                <div class="result-top">
                    <h2 id="result-stadium-name"></h2>
                    <p id="result-club-name"></p>
                    <div class="result-stats">
                        <div class="stat">
                            <span class="stat-value" id="result-distance"></span>
                            <span class="stat-label">Distance</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="result-points"></span>
                            <span class="stat-label">Points</span>
                        </div>
                    </div>
                </div>
                <div class="result-bottom">
                    <img id="result-image" src="" alt="Stadium" />
                    <div class="facts-box">
                        <h3>Stadium Facts</h3>
                        <ul id="facts-list"></ul>
                    </div>
                </div>
                <button id="next-btn" class="primary-btn">Next Stadium</button>
            </div>
        </div>
    </div>

    <!-- ROUND INTRO OVERLAY -->
    <div id="intro-overlay" class="overlay hidden">
        <div class="intro-card">
            <span id="intro-round">Round 1 of 10</span>
            <h2 id="intro-stadium-name"></h2>
            <p id="intro-club-name"></p>
            <img id="intro-image" src="" alt="Stadium" />
            <button id="intro-go-btn" class="primary-btn">Let's Go!</button>
        </div>
    </div>

    <!-- FINAL OVERLAY -->
    <div id="final-overlay" class="overlay hidden">
        <div class="final-card">
            <h1>Well Played!</h1>
            <div class="final-stats-row">
                <div class="stat">
                    <span class="stat-value" id="final-score-value"></span>
                    <span class="stat-label">Score</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="final-avg-distance"></span>
                    <span class="stat-label">Avg Distance</span>
                </div>
            </div>
            <div id="final-breakdown"></div>

            <div id="leaderboard-submit">
                <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" />
                <button id="submit-score-btn" class="primary-btn">Submit Score</button>
            </div>
            <div id="leaderboard-section" class="hidden">
                <h3>Leaderboard</h3>
                <div class="leaderboard-tabs">
                    <button class="tab-btn active" data-tab="alltime">All Time</button>
                    <button class="tab-btn" data-tab="today">Today</button>
                </div>
                <div id="leaderboard-list"></div>
            </div>

            <button id="play-again-btn" class="primary-btn">Play Again</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="stadiums.js"></script>
    <script src="game.js"></script>
    <script type="module" src="leaderboard.js"></script>
    <script data-goatcounter="https://english-football-grounds.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
